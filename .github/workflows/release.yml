name: Create Release ZIP

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create ZIP
        run: |
          mkdir -p /tmp/dish-dash
          rsync -r --exclude='.git' --exclude='.github' ./ /tmp/dish-dash/
          cd /tmp && zip -r dish-dash.zip dish-dash/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Dish Dash v${{ steps.version.outputs.VERSION }}"
          files: /tmp/dish-dash.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
